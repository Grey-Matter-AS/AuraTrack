<!doctype html>
<html lang="en" style="background-color: #0f172a;">
  <head>
    <meta charset="UTF-8" />
    <title>AuraTrack</title>

    <!-- 1. PWA Manifest Link (The 'ID Card' we create next) -->
    <link rel="manifest" href="/manifest.json" />

    <!-- 2. iOS Native Mode Trigger -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AuraTrack">

    <!-- 3. Unified Viewport (Fixed to prevent accidental zooming/jumping) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <!-- 4. Android/Chrome Theme Color -->
    <meta name="theme-color" content="#0f172a">

    <!-- 5. App Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg">

    <!-- 6. Safety: Zero White Flash CSS -->
    <style>
      html, body {
        background-color: #0f172a;
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden; /* Prevents iOS rubber-banding/bouncing */
        position: fixed; /* Keeps the app locked for an 'app-like' feel */
      }
      #root {
        background-color: #0f172a;
        min-height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
